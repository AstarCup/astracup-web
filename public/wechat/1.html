<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信跳转</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeInUp 0.6s ease-out;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #07c160, #09bb07);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        .qr-code {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #dee2e6;
            position: relative;
            overflow: hidden;
        }

        .qr-code::before {
            content: "微信二维码";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #adb5bd;
            font-size: 14px;
        }

        .wechat-icon {
            width: 60px;
            height: 60px;
            background: #07c160;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin: 0 auto 15px;
        }

        .countdown {
            background: #07c160;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .instructions {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }

        .instructions h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .instructions ol {
            padding-left: 20px;
            color: #666;
            line-height: 1.6;
        }

        .instructions li {
            margin-bottom: 8px;
        }

        .manual-link {
            display: inline-block;
            background: #07c160;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .manual-link:hover {
            background: #06a652;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(7, 193, 96, 0.3);
        }

        .footer {
            margin-top: 20px;
            color: #adb5bd;
            font-size: 12px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                margin: 20px;
            }

            .qr-code {
                width: 180px;
                height: 180px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <a href="weixin://dl/add?contact=AeCw114514" class="manual-link" id="manualLink">测试打开</a>

        <div class="footer">
            <p>如果无法自动跳转，请点击上方按钮手动打开微信</p>
        </div>
    </div>

    <script>
        // 倒计时功能
        let countdown = 5;
        const countdownElement = document.getElementById('countdown');
        const manualLink = document.getElementById('manualLink');

        function updateCountdown() {
            countdownElement.textContent = `${countdown}秒后自动跳转`;
            countdown--;

            if (countdown < 0) {
                // 尝试自动跳转到微信
                try {
                    window.location.href = 'weixin://';
                } catch (e) {
                    console.log('自动跳转失败');
                }
            } else {
                setTimeout(updateCountdown, 1000);
            }
        }

        // 手动跳转按钮点击事件
        manualLink.addEventListener('click', function (e) {
            e.preventDefault();
            try {
                window.location.href = 'weixin://';
            } catch (error) {
                alert('无法打开微信，请确保已安装微信应用');
            }
        });

        // 页面加载后开始倒计时
        document.addEventListener('DOMContentLoaded', function () {
            updateCountdown();

            // 检测是否在微信内打开
            const isWechat = /MicroMessenger/i.test(navigator.userAgent);
            if (isWechat) {
                countdownElement.textContent = '已在微信中打开';
                countdownElement.style.background = '#1890ff';
                manualLink.style.display = 'none';
            }
        });

        // 页面可见性变化时处理
        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                // 页面被隐藏，可能已经跳转到微信
                console.log('页面被隐藏，可能已跳转到微信');
            }
        });
    </script>
</body>

</html>
